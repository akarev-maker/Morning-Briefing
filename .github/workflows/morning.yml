name: Morning Cyber Briefing

on:
  schedule:
    # 12:00 UTC daily == 07:00 US Eastern (EST). Note: GitHub's scheduler can
    # run a few minutes late under load, and EDT would shift this to 08:00 local.
    - cron: "0 12 * * *"
  # Lets you run it on demand from the Actions tab for testing.
  workflow_dispatch:

permissions:
  contents: write # commit the new-jobs state file back to the repo
  issues: write # open an alert issue if a run fails

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send briefing
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          # Optional — enable HackTheBox progress. Skipped if unset.
          HTB_TOKEN: ${{ secrets.HTB_TOKEN }}
          HTB_USER_ID: ${{ secrets.HTB_USER_ID }}
          # Optional — enable federal/MA cyber internships via USAJOBS. Skipped if unset.
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: python briefing.py

      - name: Persist new-jobs state
        if: always() # keep the baseline current even if a later step failed
        run: |
          git config user.name "briefing-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "Update internship state [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      # Backstop alert: covers total failures (e.g. SMTP down) where the in-app
      # failure email in briefing.py couldn't be delivered.
      - name: Open alert issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "⚠️ Morning briefing failed — $(date -u +%Y-%m-%d)" \
            --body "The scheduled briefing run failed. Logs: $RUN_URL" \
            || echo "Could not open alert issue."
