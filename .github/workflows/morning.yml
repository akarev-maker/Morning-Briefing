name: Morning Cyber Briefing

on:
  schedule:
    # 12:00 UTC daily == 07:00 US Eastern (EST). Note: GitHub's scheduler can
    # run a few minutes late under load, and EDT would shift this to 08:00 local.
    - cron: "0 12 * * *"
  # Lets you run it on demand from the Actions tab for testing.
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send briefing
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python briefing.py
